    <text x="160" y="378" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Book a Clean</text>
    <rect x="256" y="352" width="150" height="42" rx="21" fill="transparent" stroke="#2d8a4e" stroke-width="1.5"/>
    <text x="331" y="378" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#2d8a4e" text-anchor="middle">Learn More</text>
    <!-- Trust badges -->
    <text x="80" y="424" font-family="system-ui, sans-serif" font-size="11" fill="#999">✓ No time limits      ✓ Supervisor checked      ✓ 5★ rated</text>

