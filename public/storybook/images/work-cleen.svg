<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750">
  <defs>
    <linearGradient id="cgHero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fdf9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#edf7f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cgGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d8a4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3aa660;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cgCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f4fbf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cgFooter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c6634;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d8a4e;stop-opacity:1" />
    </linearGradient>
    <clipPath id="cgBrowserClip">
      <rect x="0" y="0" width="1200" height="750" rx="10" ry="10"/>
    </clipPath>
  </defs>

  <g clip-path="url(#cgBrowserClip)">
    <!-- Browser chrome -->
    <rect x="0" y="0" width="1200" height="44" fill="#2b2b2b"/>
    <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="22" r="6" fill="#febc2e"/>
    <circle cx="60" cy="22" r="6" fill="#28c840"/>
    <rect x="200" y="10" width="800" height="24" rx="12" fill="#3a3a3a"/>
    <text x="600" y="26" font-family="system-ui, sans-serif" font-size="11" fill="#aaa" text-anchor="middle">cleenandgreen.com</text>

    <!-- Nav -->
    <rect x="0" y="44" width="1200" height="62" fill="#ffffff"/>
    <rect x="0" y="105" width="1200" height="1" fill="rgba(0,0,0,0.08)"/>
