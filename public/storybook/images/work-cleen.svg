    <rect x="0" y="446" width="1200" height="1" fill="rgba(0,0,0,0.06)"/>
    <text x="600" y="476" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#2d8a4e" text-anchor="middle" letter-spacing="3">OUR SERVICES</text>
    <!-- Service pills -->
    <rect x="48" y="490" width="200" height="56" rx="8" fill="url(#cgCard)" stroke="rgba(45,138,78,0.15)" stroke-width="1"/>
    <circle cx="68" cy="510" r="8" fill="rgba(45,138,78,0.12)"/>
    <circle cx="68" cy="510" r="4" fill="#3aa660"/>
    <text x="84" y="513" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1c3d26">Deep House Clean</text>
    <text x="84" y="530" font-family="system-ui, sans-serif" font-size="10" fill="#888">Full interior deep clean</text>

    <rect x="268" y="490" width="200" height="56" rx="8" fill="url(#cgCard)" stroke="rgba(45,138,78,0.15)" stroke-width="1"/>
    <circle cx="288" cy="510" r="8" fill="rgba(45,138,78,0.12)"/>
    <circle cx="288" cy="510" r="4" fill="#3aa660"/>
    <text x="304" y="513" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1c3d26">Post-Construction</text>
    <text x="304" y="530" font-family="system-ui, sans-serif" font-size="10" fill="#888">After-build clean-up</text>

    <rect x="488" y="490" width="200" height="56" rx="8" fill="url(#cgCard)" stroke="rgba(45,138,78,0.15)" stroke-width="1"/>
    <circle cx="508" cy="510" r="8" fill="rgba(45,138,78,0.12)"/>
    <circle cx="508" cy="510" r="4" fill="#3aa660"/>
    <text x="524" y="513" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1c3d26">Disinfection</text>
    <text x="524" y="530" font-family="system-ui, sans-serif" font-size="10" fill="#888">Steam sterilization</text>

    <rect x="708" y="490" width="200" height="56" rx="8" fill="url(#cgCard)" stroke="rgba(45,138,78,0.15)" stroke-width="1"/>
    <circle cx="728" cy="510" r="8" fill="rgba(45,138,78,0.12)"/>
    <circle cx="728" cy="510" r="4" fill="#3aa660"/>
    <text x="744" y="513" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1c3d26">Car Interior</text>
    <text x="744" y="530" font-family="system-ui, sans-serif" font-size="10" fill="#888">Full detail shampooing</text>

    <rect x="928" y="490" width="200" height="56" rx="8" fill="rgba(45,138,78,0.08)" stroke="rgba(45,138,78,0.25)" stroke-width="1.5"/>
    <text x="1028" y="520" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#2d8a4e" text-anchor="middle">+ 3 More Services</text>
    <text x="1028" y="536" font-family="system-ui, sans-serif" font-size="10" fill="#3aa660" text-anchor="middle">View all →</text>

    <!-- Testimonial strip -->
    <rect x="0" y="606" width="1200" height="80" fill="#f0faf3"/>
    <rect x="0" y="606" width="1200" height="1" fill="rgba(45,138,78,0.15)"/>
    <text x="600" y="635" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#2d4a36" text-anchor="middle">"They didn't leave until every corner was spotless. Best cleaning service in Manila!"</text>
    <text x="600" y="658" font-family="system-ui, sans-serif" font-size="11" fill="#888" text-anchor="middle">— Maria T.   ★★★★★</text>

    <!-- Footer bar -->
    <rect x="0" y="686" width="1200" height="64" fill="url(#cgFooter)"/>
    <text x="80" y="722" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="rgba(255,255,255,0.9)">Cleen &amp; Green</text>
    <text x="600" y="722" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="middle">© 2025 Cleen &amp; Green · Philippines · info@cleenandgreen.com</text>
    <rect x="950" y="708" width="110" height="26" rx="13" fill="rgba(255,255,255,0.12)"/>
    <text x="1005" y="726" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">Franchise Info</text>
  </g>
