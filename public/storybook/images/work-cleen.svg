    <circle cx="65" cy="75" r="14" fill="#2d8a4e" opacity="0.15"/>
    <circle cx="65" cy="75" r="8" fill="#2d8a4e"/>
    <text x="85" y="72" font-family="system-ui, sans-serif" font-size="15" font-weight="800" fill="#1c6634">Cleen</text>
    <text x="134" y="72" font-family="system-ui, sans-serif" font-size="15" font-weight="800" fill="#3aa660">&amp;</text>
    <text x="148" y="72" font-family="system-ui, sans-serif" font-size="15" font-weight="800" fill="#1c6634">Green</text>
    <text x="85" y="84" font-family="system-ui, sans-serif" font-size="8" fill="#888" letter-spacing="1.5">ECO-FRIENDLY CLEANING</text>
    <!-- Nav links -->
    <text x="680" y="79" font-family="system-ui, sans-serif" font-size="12" fill="#444">Services</text>
    <text x="760" y="79" font-family="system-ui, sans-serif" font-size="12" fill="#444">About</text>
    <text x="826" y="79" font-family="system-ui, sans-serif" font-size="12" fill="#444">Franchise</text>
    <text x="910" y="79" font-family="system-ui, sans-serif" font-size="12" fill="#444">Contact</text>
    <!-- CTA -->
    <rect x="1020" y="58" width="128" height="32" rx="16" fill="url(#cgGreen)"/>
    <text x="1084" y="78" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Get Free Quote</text>

    <!-- Hero -->
