    <text x="80" y="264" font-family="Georgia, serif" font-size="48" font-weight="700" fill="#2d8a4e">A Greener World.</text>
    <text x="80" y="308" font-family="system-ui, sans-serif" font-size="14" fill="#666" letter-spacing="0.2">Premium cleaning services using all-natural, eco-safe products.</text>
    <text x="80" y="326" font-family="system-ui, sans-serif" font-size="14" fill="#666" letter-spacing="0.2">No time limits. Supervisor-inspected. Family &amp; pet safe.</text>
