    <ellipse cx="980" cy="276" rx="140" ry="185" transform="rotate(-20 980 276)" fill="rgba(45,138,78,0.06)"/>
    <ellipse cx="1050" cy="240" rx="100" ry="160" transform="rotate(15 1050 240)" fill="rgba(45,138,78,0.05)"/>
    <circle cx="1100" cy="370" r="80" fill="rgba(45,138,78,0.05)"/>
