<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750">
  <defs>
    <linearGradient id="crHero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#111318;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="crAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e63946;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="crCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#141418;stop-opacity:1"/>
    </linearGradient>
    <clipPath id="crClip">
      <rect x="0" y="0" width="1200" height="750" rx="10" ry="10"/>
    </clipPath>
  </defs>
  <g clip-path="url(#crClip)">
    <!-- Browser chrome -->
    <rect x="0" y="0" width="1200" height="44" fill="#1e1e1e"/>
    <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="22" r="6" fill="#febc2e"/>
    <circle cx="60" cy="22" r="6" fill="#28c840"/>
    <rect x="200" y="10" width="800" height="24" rx="12" fill="#2a2a2a"/>
    <text x="600" y="26" font-family="system-ui, sans-serif" font-size="11" fill="#888" text-anchor="middle">crateonscene.com</text>

    <!-- Nav -->
    <rect x="0" y="44" width="1200" height="56" fill="#0d0d0f"/>
    <rect x="0" y="99" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>
    <!-- Logo -->
