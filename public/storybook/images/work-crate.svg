    <line x1="0" y1="300" x2="1200" y2="300" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <line x1="300" y1="100" x2="300" y2="410" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
