    <rect x="740" y="116" width="420" height="100" rx="10" fill="rgba(230,57,70,0.12)"/>
    <text x="760" y="152" font-family="system-ui, sans-serif" font-size="10" fill="rgba(230,57,70,0.8)" letter-spacing="2">UPCOMING EVENT</text>
    <text x="760" y="178" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#fff">SoCal Import Fest 2025</text>
    <text x="760" y="198" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.45)">Pomona Fairplex · Aug 14</text>
    <rect x="760" y="232" width="380" height="1" fill="rgba(255,255,255,0.06)"/>
