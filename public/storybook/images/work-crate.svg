    <rect x="0" y="610" width="1200" height="1" fill="rgba(255,255,255,0.05)"/>
    <text x="80" y="644" font-family="system-ui, sans-serif" font-size="14" font-weight="800" fill="#fff">CrateOnScene</text>
    <text x="80" y="662" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">Part of the Import Crate family</text>
    <text x="600" y="660" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.2)" text-anchor="middle">© 2025 CrateOnScene · Events · Drivers · Businesses · Organizers</text>
    <rect x="1060" y="628" width="100" height="28" rx="14" fill="rgba(230,57,70,0.15)" stroke="rgba(230,57,70,0.3)" stroke-width="1"/>
    <text x="1110" y="646" font-family="system-ui, sans-serif" font-size="10" fill="#e63946" text-anchor="middle">Add to Home</text>
  </g>
</svg>
