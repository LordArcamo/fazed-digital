    <text x="100" y="540" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.25)">340 attending</text>
    <rect x="100" y="558" width="60" height="18" rx="9" fill="rgba(230,57,70,0.15)"/>
