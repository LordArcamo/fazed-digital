    <text x="64" y="77" font-family="system-ui, sans-serif" font-size="11" font-weight="900" fill="#fff" text-anchor="middle">C</text>
    <text x="86" y="77" font-family="system-ui, sans-serif" font-size="14" font-weight="800" fill="#fff">CrateOnScene</text>
    <!-- Nav links -->
    <text x="700" y="77" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.55)">Events</text>
    <text x="768" y="77" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.55)">Drivers</text>
    <text x="836" y="77" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.55)">Businesses</text>
    <text x="924" y="77" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.55)">Organizers</text>
    <rect x="1048" y="59" width="110" height="28" rx="14" fill="url(#crAccent)"/>
    <text x="1103" y="77" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Join the Scene</text>

    <!-- Hero -->
