    <text x="375" y="505" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Pomona, CA · Aug 2</text>
    <text x="375" y="540" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.25)">510 attending</text>
    <rect x="375" y="558" width="68" height="18" rx="9" fill="rgba(230,57,70,0.15)"/>
    <text x="409" y="571" font-family="system-ui, sans-serif" font-size="9" fill="#e63946" text-anchor="middle">MUSCLE</text>

    <rect x="630" y="458" width="255" height="130" rx="8" fill="url(#crCard)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    <rect x="630" y="458" width="255" height="4" rx="2" fill="#e63946"/>
    <text x="650" y="487" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff">Import Crate Finals</text>
    <text x="650" y="505" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Irwindale, CA · Sep 6</text>
    <text x="650" y="540" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.25)">680 attending</text>
    <rect x="650" y="558" width="62" height="18" rx="9" fill="rgba(230,57,70,0.15)"/>
    <text x="681" y="571" font-family="system-ui, sans-serif" font-size="9" fill="#e63946" text-anchor="middle">TUNER</text>

    <rect x="905" y="458" width="255" height="130" rx="8" fill="rgba(230,57,70,0.08)" stroke="rgba(230,57,70,0.2)" stroke-width="1"/>
    <text x="1032" y="518" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#e63946" text-anchor="middle">+ 120 More</text>
    <text x="1032" y="538" font-family="system-ui, sans-serif" font-size="11" fill="rgba(230,57,70,0.6)" text-anchor="middle">Browse all events →</text>

    <!-- Footer -->
