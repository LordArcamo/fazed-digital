<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a18;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a2520;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4891a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8a832;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c2820;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#231f18;stop-opacity:1" />
    </linearGradient>
    <clipPath id="browserClip">
      <rect x="0" y="0" width="1200" height="750" rx="10" ry="10"/>
    </clipPath>
  </defs>

  <!-- Browser chrome -->
  <g clip-path="url(#browserClip)">
    <!-- Browser bar -->
    <rect x="0" y="0" width="1200" height="44" fill="#2b2b2b"/>
    <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="22" r="6" fill="#febc2e"/>
    <circle cx="60" cy="22" r="6" fill="#28c840"/>
    <!-- URL bar -->
    <rect x="200" y="10" width="800" height="24" rx="12" fill="#3a3a3a"/>
    <text x="600" y="26" font-family="system-ui, sans-serif" font-size="11" fill="#aaa" text-anchor="middle">aframingcompany.com</text>

    <!-- === SITE CONTENT === -->

    <!-- Nav -->
    <rect x="0" y="44" width="1200" height="60" fill="#111110"/>
    <!-- Logo -->
    <rect x="48" y="60" width="6" height="28" fill="#d4891a"/>
    <text x="62" y="80" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="1">A FRAMING CO.</text>
    <!-- Nav links -->
    <text x="820" y="79" font-family="system-ui, sans-serif" font-size="12" fill="#aaaaaa">Services</text>
    <text x="900" y="79" font-family="system-ui, sans-serif" font-size="12" fill="#aaaaaa">Portfolio</text>
    <text x="978" y="79" font-family="system-ui, sans-serif" font-size="12" fill="#aaaaaa">About</text>
    <!-- CTA button -->
    <rect x="1076" y="62" width="90" height="28" rx="4" fill="#d4891a"/>
    <text x="1121" y="80" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">Contact Us</text>

    <!-- Hero section -->
    <rect x="0" y="104" width="1200" height="360" fill="url(#heroGrad)"/>
    <!-- Subtle texture lines -->
    <line x1="0" y1="140" x2="1200" y2="140" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <line x1="0" y1="260" x2="1200" y2="260" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <line x1="0" y1="320" x2="1200" y2="320" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <line x1="0" y1="380" x2="1200" y2="380" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <!-- Hero text -->
    <text x="80" y="180" font-family="Georgia, serif" font-size="13" fill="#d4891a" letter-spacing="4">UTAH'S TRUSTED FRAMING CONTRACTORS</text>
    <text x="80" y="240" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#ffffff">Built with</text>
    <text x="80" y="300" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#ffffff">Precision.</text>
    <text x="80" y="350" font-family="system-ui, sans-serif" font-size="15" fill="rgba(255,255,255,0.55)" letter-spacing="0.3">Wood Framing · Concrete · Roofing · Residential &amp; Commercial</text>
    <!-- CTA buttons -->
    <rect x="80" y="388" width="160" height="42" rx="4" fill="#d4891a"/>
    <text x="160" y="414" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">View Our Work</text>
    <rect x="256" y="388" width="150" height="42" rx="4" fill="transparent" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="331" y="414" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.7)" text-anchor="middle">Get a Quote</text>
    <!-- Hero image placeholder (right side) — structural A-frame silhouette -->
    <rect x="650" y="115" width="530" height="340" fill="rgba(0,0,0,0.2)"/>
    <polygon points="915,135 1060,415 770,415" fill="none" stroke="rgba(212,137,26,0.5)" stroke-width="2"/>
    <line x1="915" y1="135" x2="915" y2="415" stroke="rgba(212,137,26,0.3)" stroke-width="1.5" stroke-dasharray="8,6"/>
    <line x1="800" y1="295" x2="1030" y2="295" stroke="rgba(212,137,26,0.4)" stroke-width="1.5"/>
    <circle cx="915" cy="135" r="5" fill="rgba(212,137,26,0.9)"/>
    <circle cx="800" cy="295" r="3.5" fill="rgba(212,137,26,0.6)"/>
    <circle cx="1030" cy="295" r="3.5" fill="rgba(212,137,26,0.6)"/>
    <text x="915" y="400" font-family="Georgia, serif" font-size="180" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1.5" text-anchor="middle">AF</text>

    <!-- Services strip -->
    <rect x="0" y="464" width="1200" height="120" fill="#161614"/>
    <line x1="0" y1="464" x2="1200" y2="464" stroke="rgba(212,137,26,0.4)" stroke-width="2"/>
    <!-- 3 service cards -->
    <!-- Card 1 -->
    <rect x="48" y="482" width="340" height="82" rx="6" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="48" y="482" width="4" height="82" rx="2" fill="#d4891a"/>
    <text x="70" y="517" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#fff">Wood Framing</text>
    <text x="70" y="538" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.45)">Custom homes · Production builds · Multi-family</text>
    <!-- Card 2 -->
    <rect x="430" y="482" width="340" height="82" rx="6" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="430" y="482" width="4" height="82" rx="2" fill="#d4891a"/>
    <text x="452" y="517" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#fff">Concrete Work</text>
    <text x="452" y="538" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.45)">Foundations · Flatwork · Retaining walls</text>
    <!-- Card 3 -->
    <rect x="812" y="482" width="340" height="82" rx="6" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="812" y="482" width="4" height="82" rx="2" fill="#d4891a"/>
    <text x="834" y="517" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#fff">Roofing</text>
    <text x="834" y="538" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.45)">Residential &amp; light commercial roofing</text>

    <!-- Portfolio strip -->
    <rect x="0" y="584" width="1200" height="166" fill="#0e0e0c"/>
    <text x="80" y="618" font-family="Georgia, serif" font-size="13" fill="rgba(212,137,26,0.8)" letter-spacing="3">PORTFOLIO</text>
    <text x="80" y="646" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#ffffff">Recent Projects</text>
    <!-- Project thumb placeholders -->
    <rect x="80" y="660" width="240" height="72" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="200" y="700" font-family="Georgia, serif" font-size="11" fill="rgba(255,255,255,0.2)" text-anchor="middle">American Fork, UT</text>
    <rect x="336" y="660" width="240" height="72" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="456" y="700" font-family="Georgia, serif" font-size="11" fill="rgba(255,255,255,0.2)" text-anchor="middle">Park City, UT</text>
    <rect x="592" y="660" width="240" height="72" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="712" y="700" font-family="Georgia, serif" font-size="11" fill="rgba(255,255,255,0.2)" text-anchor="middle">Salt Lake City, UT</text>
    <rect x="848" y="660" width="240" height="72" rx="4" fill="rgba(212,137,26,0.12)" stroke="rgba(212,137,26,0.2)" stroke-width="1"/>
    <text x="968" y="700" font-family="Georgia, serif" font-size="11" fill="rgba(212,137,26,0.5)" text-anchor="middle">View All →</text>
  </g>
</svg>
