    <text x="400" y="660" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">Phones</text>
    <text x="470" y="660" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">Tablets</text>
    <text x="540" y="660" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">Accessories</text>
