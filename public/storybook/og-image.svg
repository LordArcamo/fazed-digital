<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg-glow" cx="18%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1C1C1C"/>
      <stop offset="100%" stop-color="#090909"/>
    </radialGradient>
    <!-- Accent glow -->
    <radialGradient id="accent-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9FF57" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C9FF57" stop-opacity="0"/>
    </radialGradient>
    <!-- Noise filter -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-glow)"/>

  <!-- Noise overlay -->
  <rect width="1200" height="630" fill="#090909" opacity="0.02" filter="url(#noise)"/>

  <!-- Subtle grid -->
  <g stroke="white" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Accent glow circle (top-right area) -->
  <ellipse cx="950" cy="180" rx="260" ry="260" fill="url(#accent-glow)"/>

  <!-- Decorative orbit rings (right side) -->
  <circle cx="960" cy="315" r="200" fill="none" stroke="rgba(201,255,87,0.06)" stroke-width="1"/>
  <circle cx="960" cy="315" r="140" fill="none" stroke="rgba(201,255,87,0.08)" stroke-width="1"/>
  <circle cx="960" cy="315" r="80"  fill="none" stroke="rgba(201,255,87,0.12)" stroke-width="1"/>

  <!-- Orbit dots -->
  <circle cx="960" cy="115" r="5" fill="#C9FF57" opacity="0.7"/>
  <circle cx="1120" cy="275" r="3.5" fill="#C9FF57" opacity="0.5"/>
  <circle cx="1010" cy="490" r="4" fill="#C9FF57" opacity="0.4"/>
  <circle cx="800" cy="360" r="3" fill="#C9FF57" opacity="0.35"/>

  <!-- Left border accent line -->
  <rect x="72" y="156" width="2" height="318" fill="#C9FF57" opacity="0.4" rx="1"/>

  <!-- Logo mark (large) -->
  <g transform="translate(90, 176) scale(0.038)">
    <g transform="translate(0 1500) scale(0.1 -0.1)" fill="#F5F4F0" opacity="0.95">
      <path d="M7445 12847 c-22 -13 -348 -206 -725 -429 -377 -222 -723 -427 -770 -455 -47 -27 -506 -299 -1020 -603 -514 -303 -969 -572 -1012 -597 -43 -25 -87 -56 -98 -70 -20 -26 -20 -37 -20 -3282 0 -2590 3 -3261 13 -3274 17 -22 3645 -2000 3679 -2005 26 -4 692 354 2443 1313 143 79 481 263 750 409 270 147 496 274 503 283 19 26 18 1456 -2 1472 -10 8 -27 4 -72 -20 -32 -18 -854 -465 -1826 -995 -972 -530 -1776 -964 -1787 -964 -24 0 -2303 1299 -2338 1332 l-23 21 0 2517 0 2517 23 20 c12 11 326 199 697 418 371 219 945 558 1275 753 884 522 1310 774 1495 883 118 70 166 103 168 118 3 18 -78 61 -637 341 -353 176 -649 320 -658 320 -10 0 -36 -11 -58 -23z"/>
      <path d="M9455 11664 c-28 -15 -295 -161 -595 -324 -300 -163 -624 -340 -720 -392 -96 -53 -195 -107 -220 -121 -25 -13 -241 -131 -480 -262 -239 -130 -500 -272 -580 -316 -80 -44 -341 -186 -580 -317 -319 -174 -438 -244 -447 -262 -17 -33 -19 -4306 -2 -4342 8 -18 164 -100 645 -341 349 -174 643 -317 653 -317 11 0 21 9 25 23 3 12 6 949 6 2083 l0 2061 23 20 c12 11 398 242 857 513 459 271 900 532 980 579 80 48 511 303 958 566 447 264 822 488 833 498 11 10 17 23 13 28 -9 15 -1281 649 -1302 649 -9 0 -40 -12 -67 -26z"/>
      <path d="M11135 10316 c-11 -7 -74 -42 -140 -78 -66 -36 -230 -126 -365 -201 -720 -396 -2614 -1437 -2698 -1482 -30 -16 -62 -40 -73 -53 -19 -24 -19 -70 -19 -1918 0 -1695 2 -1894 15 -1908 14 -14 79 16 664 309 366 182 651 331 655 340 3 9 6 537 6 1174 l0 1158 23 20 c12 12 456 274 987 583 531 309 975 573 988 586 l22 25 0 718 c0 725 -1 742 -34 740 -6 0 -20 -6 -31 -13z"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="148" y="306" font-family="'Clash Display', 'Georgia', serif" font-size="96" font-weight="700" letter-spacing="-3" fill="#F5F4F0">Fazed</text>
  <text x="152" y="360" font-family="'Space Mono', 'Courier New', monospace" font-size="13" letter-spacing="5" fill="#676767" text-transform="uppercase">DIGITAL</text>

  <!-- Divider -->
  <rect x="148" y="390" width="280" height="1" fill="#2A2A2A"/>

  <!-- Tagline -->
  <text x="148" y="430" font-family="'Plus Jakarta Sans', 'Arial', sans-serif" font-size="22" font-weight="400" fill="#939393" letter-spacing="0">Bold Creative Agency — Iligan City, PH</text>

  <!-- Services pills -->
  <g transform="translate(148, 468)">
    <!-- Web Design -->
    <rect x="0" y="0" width="124" height="28" rx="14" fill="#1C1C1C" stroke="#2A2A2A" stroke-width="1"/>
    <text x="62" y="19" font-family="'Space Mono', monospace" font-size="10.5" fill="#939393" text-anchor="middle" letter-spacing="0.5">Web Design</text>
    <!-- Brand Identity -->
    <rect x="132" y="0" width="138" height="28" rx="14" fill="#1C1C1C" stroke="#2A2A2A" stroke-width="1"/>
    <text x="201" y="19" font-family="'Space Mono', monospace" font-size="10.5" fill="#939393" text-anchor="middle" letter-spacing="0.5">Brand Identity</text>
    <!-- SEO Marketing -->
    <rect x="278" y="0" width="134" height="28" rx="14" fill="#1C1C1C" stroke="#2A2A2A" stroke-width="1"/>
    <text x="345" y="19" font-family="'Space Mono', monospace" font-size="10.5" fill="#939393" text-anchor="middle" letter-spacing="0.5">SEO Marketing</text>
  </g>

  <!-- URL bottom-left -->
  <text x="148" y="580" font-family="'Space Mono', 'Courier New', monospace" font-size="13" fill="#404040" letter-spacing="1">fazeddigital.com</text>

  <!-- Accent dot (top-right corner) -->
  <circle cx="1152" cy="78" r="22" fill="#C9FF57"/>

  <!-- Bottom border line -->
  <rect x="0" y="621" width="1200" height="2" fill="#C9FF57" opacity="0.15"/>
</svg>
